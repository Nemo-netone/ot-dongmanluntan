server:
  port: ${PORT:8090}
  servlet:
    session:
      timeout: PT24H

spring:
  servlet:
    multipart:
      max-file-size: 1000MB
      max-request-size: 1000MB
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  cache:
    ehcache:
      config: classpath:config/ehcache.xml
  application:
    name: ot-dongmanluntan-api
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=ot_dongmanluntan}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    dbcp2:
      min-idle: 2
      initial-size: 2
      max-total: 10
      max-wait-millis: 3000

mybatis-plus:
  mapperLocations: classpath:mapper/*.xml
  typeAliasesPackage: com.admin.entity,com.admin.dto,com.admin.sys.base.**.entity,com.admin.sys.base.**.dto
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: ${LOG_PATH:logs/files}
  level:
    com: ${APP_LOG_LEVEL:info}
    org.springframework: warn
